<!DOCTYPE html>
<html lang="en">
<head>
    <title>Your 2025 In Review</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes, minimal-ui">
    <style>
        @media (prefers-color-scheme: dark) {
            html, body {
                background-color: #101010;
                color: #efefef;
            }
        }
        
        /* Debug Console Styles */
        .debug-trigger {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .debug-trigger.visible {
            opacity: 1;
        }
        
        .debug-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: rgba(0, 0, 0, 0.95);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 10000;
            display: none;
            flex-direction: column;
            border-top: 2px solid #333;
        }
        
        .debug-console.visible {
            display: flex;
        }
        
        .debug-header {
            background: #333;
            color: white;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #555;
        }
        
        .debug-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .debug-message {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        
        .debug-message.error {
            color: #ff6b6b;
        }
        
        .debug-message.warn {
            color: #ffd93d;
        }
        
        .debug-message.info {
            color: #74c0fc;
        }
        
        .debug-message.log {
            color: #00ff00;
        }
        
        .debug-timestamp {
            color: #888;
            font-size: 10px;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="../shared-widget-styles.css">
    <link rel="stylesheet" type="text/css" href="recap.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" />
    <script src="https://kit.fontawesome.com/<kit-code>.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/MinistryPlatform-Community/MPCustomWidgets@main/dist/js/customWidgetV1.js"></script>
    <script defer src="https://feedback.fish/ff.js?pid=<project-code>"></script>
</head>

<body>
    <!-- Debug Console Trigger (hidden, activated by 5 taps on title) -->
    <div class="debug-trigger" id="debugTrigger"></div>
    
    <!-- Debug Console -->
    <div class="debug-console" id="debugConsole">
        <div class="debug-header">
            <span>Debug Console</span>
            <div>
                <button onclick="clearDebugConsole()" style="margin-right: 10px; padding: 2px 8px; background: #555; color: white; border: none; border-radius: 3px; cursor: pointer;">Clear</button>
                <button onclick="toggleDebugConsole()" style="padding: 2px 8px; background: #555; color: white; border: none; border-radius: 3px; cursor: pointer;">Close</button>
            </div>
        </div>
        <div class="debug-content" id="debugContent">
            <div class="debug-message info"><span class="debug-timestamp">[${new Date().toLocaleTimeString()}]</span> Debug console initialized</div>
        </div>
    </div>
    
    <div
        id="2025Recap"
        data-component="CustomWidget"
        data-sp="api_Custom_2025Recap"
        data-params="@UserGUID=[uid]"
        data-template="recap-template.html"
        data-requireUser="false"
        data-cache="true"
        data-debug="true"
        data-host="mpi"
        style="margin-bottom: 6rem;"
        >
        <div style="text-align:center;margin-top:25vh;font-size:1.5rem;" id="loadingContainer">
            <p style="color: var(--cloud); margin-bottom: 2rem;">Loading...</p>
            <i class="fa-kit fa-dcc-badge fa-beat-fade fa-2xl" style="color: #bc204b;position:relative;left:-10px;"></i></div>
    </div>

    <script>
        // Debug Console Implementation
        let debugMessages = [];
        let tapCount = 0;
        let debugVisible = false;
        
        // Capture console messages
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };
        
        function addDebugMessage(type, args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = Array.from(args).map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            
            debugMessages.push({ type, message, timestamp });
            
            // Keep only last 100 messages
            if (debugMessages.length > 100) {
                debugMessages.shift();
            }
            
            updateDebugDisplay();
        }
        
        // Override console methods
        console.log = function(...args) {
            originalConsole.log.apply(console, args);
            addDebugMessage('log', args);
        };
        
        console.error = function(...args) {
            originalConsole.error.apply(console, args);
            addDebugMessage('error', args);
        };
        
        console.warn = function(...args) {
            originalConsole.warn.apply(console, args);
            addDebugMessage('warn', args);
        };
        
        console.info = function(...args) {
            originalConsole.info.apply(console, args);
            addDebugMessage('info', args);
        };
        
        // Capture unhandled errors
        window.addEventListener('error', function(e) {
            addDebugMessage('error', [`Unhandled Error: ${e.message}`, `File: ${e.filename}`, `Line: ${e.lineno}`]);
        });
        
        // Capture unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
            addDebugMessage('error', [`Unhandled Promise Rejection: ${e.reason}`]);
        });
        
        function updateDebugDisplay() {
            if (!debugVisible) return;
            
            const content = document.getElementById('debugContent');
            if (content) {
                content.innerHTML = debugMessages.map(msg => 
                    `<div class="debug-message ${msg.type}"><span class="debug-timestamp">[${msg.timestamp}]</span> ${msg.message}</div>`
                ).join('');
                content.scrollTop = content.scrollHeight;
            }
        }
        
        function toggleDebugConsole() {
            debugVisible = !debugVisible;
            const console = document.getElementById('debugConsole');
            const trigger = document.getElementById('debugTrigger');
            
            if (debugVisible) {
                console.classList.add('visible');
                trigger.classList.add('visible');
                updateDebugDisplay();
            } else {
                console.classList.remove('visible');
                trigger.classList.remove('visible');
            }
        }
        
        function clearDebugConsole() {
            debugMessages = [];
            updateDebugDisplay();
        }
        
        // Activate debug mode with 5 taps on loading text
        document.addEventListener('DOMContentLoaded', function() {
            const loadingContainer = document.getElementById('loadingContainer');
            const debugTrigger = document.getElementById('debugTrigger');
            
            if (loadingContainer) {
                loadingContainer.addEventListener('click', function() {
                    tapCount++;
                    console.log(`Debug tap count: ${tapCount}`);
                    
                    if (tapCount >= 5) {
                        toggleDebugConsole();
                        tapCount = 0; // Reset counter
                    }
                    
                    // Reset tap count after 3 seconds of inactivity
                    setTimeout(() => {
                        if (tapCount < 5) tapCount = 0;
                    }, 3000);
                });
            }
            
            if (debugTrigger) {
                debugTrigger.addEventListener('click', toggleDebugConsole);
            }
        });
        
        // Log initial page load info
        console.info('2025 Recap page loaded', {
            userAgent: navigator.userAgent,
            url: window.location.href,
            timestamp: new Date().toISOString()
        });
    </script>
</body>
</html>
